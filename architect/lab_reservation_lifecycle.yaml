# Optional reservation-time link-up + speed-mode automation (OFF by default).
# Always run: python3 lab_staging_workflow.py backup
# before enabling flags or uploading experimental drivers.

enabled: false

sonic:
  enabled: false
  # CONFIGURABLE + config asset + driver setConfig→setup (see sonic_topology_reservation.py)
  default_speed_gbps: 400
  default_template: RoCE-400G
  devices:
    - Arista-01-RL
    - Arista-02
    - Arista-04
  driver_interface: Configurable
  require_baselines_on_switch: true

aresone:
  enabled: false
  # Hogan REST: takeOwnership + verifyReady (read-only link poll; no speed change on chassis)
  verify_timeout_s: 120
  default_ports: []  # empty = all reserved topology ports
  devices:
    - ARESONE-M01
    - ARESONE-M02
    - ARESONE-M03
    - ARESONE-M04
    - ARESONE-M05
    - ARESONE-M06
    - ARESONE-M07
    - ARESONE-M08
  prefer_driver: IXIA-Chassis-Mgmt  # Hogan REST; SSH driver has verify-only stub

arista_eos:
  enabled: false
  # Future: EOS speed forced via CONFIGURABLE wrapper (not implemented — VLAN-only today)
  devices:
    - Arista-03
    - Arista-03-RL

uhd:
  enabled: true
  # See knowledge-base/UHD_RS_FEC_RESERVATION.md (production path)

backup:
  root: /root/Apps/velocity/architect/backups
  label_prefix: pre-lifecycle
  keep_last: 5
