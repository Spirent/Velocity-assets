# UHD ↔ AresONE via Calient OCS (off-canvas hops).
# Physical path: M05 optics → OCS 1.1.1  ↔  6.1.1 ← UHD port 1 (blade 6.1).
#
# RS-FEC on reservation:
#   Velocity UI: CONFIGURABLE + template config asset + topology useDefaultConfig → setConfig→setup.
#   LAAS reserve-topology: same + driver setup hook after ACTIVE as fallback.
#   Repair UI reserve without re-reserving: python3 velocity_orchestrate_ai_lab.py uhd-ensure-fec
#   Do NOT curl/script POST /config outside an ACTIVE UHD-AresONE-S reservation.
#
# Unblock (Jul-2 patch, no RS-FEC):
#   cd /root/Apps/LAAS/scripts && python3 uhd_velocity_up.py
# Deep recovery after probe sweeps only:
#   python3 uhd_lab_hygiene.py --force
#   • Do not leave partial 400G profiles or probe wiring on UHD port 3 — breaks driver discover.
topology: UHD-AresONE-S
aresone_device: ARESONE-M05
aresone_port: "1.1"
aresone_ip: 10.36.84.35
calient_device: Calient-CT-S320-gxcp-live
calient_triplet_aresone: "1.1.1"
calient_triplet_uhd: "6.1.1"
uhd_device: tf2-uhdc-e2e
uhd_ip: 10.36.87.102
uhd_port: "1"
l1:
  port: 1
  speed_gbps: 400
  fec_mode: reed_solomon
  verify_timeout_s: 120
revert_ports:
  - device: tf2-uhdc-e2e
    port: "3"
    reason: old canvas port — UHD on port 1 / OCS 6.1.1
  - device: ARESONE-M05
    port: "1.1"
    prior_calient_triplet: "6.1.2"
    reason: wrong blade-6.1 internal leg — M05 ingress is 1.1.1
  - device: ARESONE-M06
    port: "1.1"
    prior_calient_triplet: "6.1.1"
    reason: M06 removed from UHD topology
  - device: ARESONE-M06
    port: "6.1"
    reason: wrong direct inventory link to UHD
